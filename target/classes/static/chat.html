<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>食养AI - 老中医智能助手</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/diet.css">
    <link rel="stylesheet" href="css/sleep.css">
    <link rel="stylesheet" href="css/profile.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-container">
    <!-- 左侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="collapse-btn" onclick="window.toggleSidebar()">◀</div>
        <div class="nav-menu">
            <div class="nav-item" data-panel="chat" onclick="window.switchPanel('chat')">
                <span class="nav-icon">💬</span>
                <span class="nav-text">智能问诊</span>
            </div>
            <div class="nav-item" data-panel="profile" onclick="window.switchPanel('profile')">
                <span class="nav-icon">📋</span>
                <span class="nav-text">健康档案</span>
            </div>
            <div class="nav-item" data-panel="diet" onclick="window.switchPanel('diet')">
                <span class="nav-icon">🍽️</span>
                <span class="nav-text">饮食记录</span>
            </div>
            <div class="nav-item" data-panel="sleep" onclick="window.switchPanel('sleep')">
                <span class="nav-icon">😴</span>
                <span class="nav-text">睡眠记录</span>
            </div>
            <div class="nav-item" data-panel="assessment" onclick="window.switchPanel('assessment')">
                <span class="nav-icon">📝</span>
                <span class="nav-text">体质测评</span>
            </div>
            <div class="nav-item" data-panel="solar" onclick="window.switchPanel('solar')">
                <span class="nav-icon">🌙</span>
                <span class="nav-text">节气养生</span>
            </div>
            <div class="nav-item" data-panel="report" onclick="window.switchPanel('report')">
                <span class="nav-icon">📊</span>
                <span class="nav-text">健康报告</span>
            </div>
        </div>
        <div class="user-section">
            <div class="user-info" id="userInfoBtn">
                <div class="user-avatar" id="avatarEmoji">👤</div>
                <div class="user-info-text">
                    <div class="user-name" id="usernameDisplay">加载中...</div>
                    <div class="user-constitution" id="constitutionDisplay">未测评</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧主内容区 -->
    <div class="main-content">
        <div class="chat-header">
            <h2>🌿 食养AI - 老中医智能助手</h2>
            <p>我是您的专属中医顾问，根据您的体质提供个性化养生建议</p>
        </div>

        <div class="feature-area" id="featureArea">
            <div id="chat-panel" class="feature-panel active">
                <div class="messages-container" id="messagesContainer"></div>
            </div>
            <div id="profile-panel" class="feature-panel"></div>
            <div id="diet-panel" class="feature-panel"></div>
            <div id="sleep-panel" class="feature-panel"></div>
            <div id="assessment-panel" class="feature-panel"></div>
            <div id="solar-panel" class="feature-panel"></div>
            <div id="report-panel" class="feature-panel"></div>
        </div>

        <div class="input-area" id="inputArea">
            <input type="text" id="messageInput" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter') window.sendMessage()">
            <button onclick="window.sendMessage()">发送</button>
        </div>
    </div>
</div>

<!-- 脚本加载顺序很重要 -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/chat.js"></script>
<script src="js/profile.js"></script>
<script src="js/diet.js"></script>
<script src="js/sleep.js"></script>
<script src="js/assessment.js"></script>
<script src="js/solar.js"></script>
<script src="js/report.js"></script>
<script src="js/app.js"></script>
</body>
</html>
