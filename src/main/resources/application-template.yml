spring:
  application:
    name: shiyang-ai

  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  sql:
    init:
      mode: never

  data:
    redis:
      host: localhost
      port: 6379
      database: 8
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# USDA API ?????demo key?????????
usda:
  api:
    key: ${DEEPSEEK_API_KEY}
    url: ${URL}

# ????
cache:
  nutrition:
    ttl: 3600
    max-size: 1000

# ??
logging:
  level:
    com.shiyang: DEBUG

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

deepseek:
  api:
    key: ${DEEPSEEK_API_KEY}

# 自定义配置
food:
  cache:
    ttl: 2592000  # 30天
    max-size: 10000
  crawler:
    timeout: 5000
    retry: 3